rule_id: USCG-K-122-520-IMMERSION
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 122.520"
title: "Immersion Suit Drill"
subchapter: K
category: drills

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_immersion_suit_drill
  frequency_text: "Monthly on cold water routes"

required_action: >
  Conduct immersion suit drill. Each crew member must don an immersion suit
  within 2 minutes. Verify suit condition, zippers, seals, and retroreflective
  tape. Applicable on cold water routes where water temperature is below 15°C
  (59°F). Log in vessel logbook.
deadline_calc: "last_immersion_suit_drill_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-122.520"
notes: "Only required for vessels operating on cold water routes. Check route water temperatures."
