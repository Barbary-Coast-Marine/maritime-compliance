  metric: pre_departure
  frequency_text: "Before departure (12 hours prior for voyages >48h)"

required_action: >
  Test steering gear, whistle, and means of communication between
  pilothouse and engine room. For vessels away from shore >48h,
  test 12 hours before departure. All others test at least weekly.
  Record in vessel logbook.
deadline_calc: "Before each departure or weekly"
