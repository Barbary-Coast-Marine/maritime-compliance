rule_id: USCG-K-115-600
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 115.600"
title: "Drydock and Internal Structural Examination"
subchapter: K
category: certificates

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 30
  metric: days_since_drydock
  frequency_text: "Every 5 years (or per COI)"

required_action: >
  Vessel must undergo drydock examination and internal structural
  examination. Schedule with USCG-approved facility. UWILD examination
  may be available as alternative. Hull plating, frames, and structural
  members must be assessed for wastage and damage.
deadline_calc: "last_drydock_date + 1825 days (5 years standard)"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-115.600"
notes: "Interval may vary depending on vessel construction and OCMI determination. Check COI."
