rule_id: USCG-K-122-520-ABANDON
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 122.520"
title: "Abandon Ship Drill"
subchapter: K
category: drills

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_abandon_ship_drill
  frequency_text: "Weekly when vessel is in operation"

required_action: >
  Conduct abandon-ship drill. Must include: sounding general alarm,
  mustering passengers and crew at survival craft stations, checking
  lifejackets correctly donned, lowering at least one survival craft
  or rescue boat. At least one night drill per quarter. Log in vessel logbook.
deadline_calc: "last_abandon_ship_drill_date + 7 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-122.520"
notes: "Each lifeboat launched with crew aboard at least once every 3 months."
