citation: "46 CFR 131.310"
title: "Navigation Equipment Check"
subchapter: L
category: pre_departure

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Pre-departure"

required_action: >
  Check all navigation equipment prior to departure. Verify proper
  operation of radar, GPS, compass, depth sounder, AIS, navigation
  lights, sound signaling devices, and communication equipment.
  Confirm charts and publications are corrected to latest notices
  to mariners. Log in official logbook.
deadline_calc: "Before each departure"
fine_range_usd: [5000, 25000]
