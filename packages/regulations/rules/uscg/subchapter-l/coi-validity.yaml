rule_id: USCG-L-125-120-COI
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 125.120"
title: "Certificate of Inspection Validity"
subchapter: L
category: certificates

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 30
  metric: days_since_coi_issuance
  frequency_text: "Every 5 years"

required_action: >
  Renew Certificate of Inspection before expiration. Schedule USCG
  inspection, ensure vessel meets all applicable regulatory requirements,
  correct any outstanding deficiencies. Vessel may not operate with
  expired COI. Coordinate with local OCMI for renewal inspection.
deadline_calc: "coi_issue_date + 1825 days"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-125.120"
notes: "Vessel may not operate commercially with an expired COI."
