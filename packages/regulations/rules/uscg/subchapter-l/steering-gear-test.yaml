  frequency_text: "Pre-departure"

required_action: >
  Test steering gear prior to departure. Operate main and auxiliary
  steering gear through full range. Test all steering gear control
  systems including remote and local stations. Verify emergency
  steering procedures. Test communication between bridge and steering
  gear compartment. Log in official logbook.
deadline_calc: "Before each departure"
fine_range_usd: [10000, 50000]
