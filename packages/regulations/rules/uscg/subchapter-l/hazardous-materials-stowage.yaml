rule_id: USCG-L-131-350-HAZMAT
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 131.350"
title: "Hazardous Materials Stowage"
subchapter: L
category: inspections

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Per loading"

required_action: >
  Verify proper stowage of all hazardous materials before departure.
  Confirm materials are properly classified, labeled, packaged, and
  segregated per 49 CFR and IMDG Code requirements. Ensure hazmat
  manifest is complete and accessible. Verify crew is briefed on
  hazardous cargo aboard and emergency procedures. Log in official
  logbook.
deadline_calc: "Before departure after each hazardous materials loading"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-131.350"
notes: "Applies to all DOT-classified hazardous materials carried as cargo to offshore platforms."
