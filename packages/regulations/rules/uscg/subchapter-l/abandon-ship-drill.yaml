rule_id: USCG-L-131-560-ABANDON
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 131.560"
title: "Abandon Ship Drill"
subchapter: L
category: drills

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 5
  critical_days: 1
  metric: days_since_abandon_ship_drill
  frequency_text: "Monthly minimum"

required_action: >
  Conduct abandon ship drill with all crew. Must include: sounding abandon
  ship signal, reporting to muster stations with lifejackets, preparing
  lifeboats and liferafts for launching, demonstrating embarkation
  procedures, starting lifeboat engines. Log in official logbook.
deadline_calc: "last_abandon_ship_drill_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-131.560"
notes: null
