rule_id: USCG-L-131-910-OFFSHORE-PAX
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 131.910"
title: "Offshore Personnel Accommodation Safety Check"
subchapter: L
category: pre_departure

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Pre-departure when carrying offshore workers"

required_action: >
  Conduct safety check of offshore personnel accommodation spaces
  before departure when carrying offshore workers. Verify adequate
  lifejackets for all persons aboard, muster station assignments,
  safety briefing completion, accommodation ventilation, emergency
  exits unobstructed, and communication systems functional.
  Log in official logbook.
deadline_calc: "Before each departure when carrying offshore workers"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-131.910"
notes: "Required only when vessel is carrying offshore workers in addition to crew."
