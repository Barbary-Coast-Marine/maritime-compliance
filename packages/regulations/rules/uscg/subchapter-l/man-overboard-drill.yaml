rule_id: USCG-L-131-560-MOB
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 131.560"
title: "Man Overboard Drill"
subchapter: L
category: drills

applies_to:
  vessel_types: [offshore_supply]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 5
  critical_days: 1
  metric: days_since_mob_drill
  frequency_text: "Monthly"

required_action: >
  Conduct man overboard drill with all crew. Must include: sounding MOB
  alarm, deploying rescue equipment, maneuvering vessel for recovery,
  demonstrating retrieval procedures, and testing communication between
  bridge and deck crew. Log in official logbook.
deadline_calc: "last_mob_drill_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-131.560"
notes: null
