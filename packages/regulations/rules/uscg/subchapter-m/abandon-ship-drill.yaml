rule_id: USCG-M-142-245-ABANDON
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.245"
title: "Abandon Ship Drill"
subchapter: M
category: drills

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_abandon_ship_drill
  frequency_text: "Monthly minimum"

required_action: >
  Conduct abandon-ship drill. Must include: sounding general alarm,
  mustering crew at survival craft stations, checking lifejackets
  correctly donned, preparing survival craft for launching. Each crew
  member must know their duties and station. Log in vessel logbook.
deadline_calc: "last_abandon_ship_drill_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.245"
notes: null
