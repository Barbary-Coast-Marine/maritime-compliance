rule_id: USCG-M-142-245-FIRE
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.245"
title: "Fire Drill"
subchapter: M
category: drills

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_fire_drill
  frequency_text: "Monthly minimum"

required_action: >
  Conduct fire drill with all crew. Must include: sounding general alarm,
  reporting to assigned stations, simulating fire emergency, starting fire
  pumps, demonstrating use of firefighting equipment and breathing apparatus,
  operating watertight and fire doors. Log in vessel logbook.
deadline_calc: "last_fire_drill_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.245"
notes: "Drills should be conducted at different times and under varying conditions to ensure crew readiness."
