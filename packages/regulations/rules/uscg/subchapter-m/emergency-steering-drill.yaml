rule_id: USCG-M-142-245-EMSTEER
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.245"
title: "Emergency Steering Drill"
subchapter: M
category: drills

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 90
  warning_days: 14
  critical_days: 0
  metric: days_since_emergency_steering_drill
  frequency_text: "Quarterly"

required_action: >
  Conduct emergency steering drill. Simulate failure of primary steering
  system and practice switchover to backup/emergency steering. Crew must
  demonstrate ability to steer vessel using alternate means. Verify
  communication between pilothouse and steering gear room. Log in logbook.
deadline_calc: "last_emergency_steering_drill_date + 90 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.245"
notes: "Especially important for towing vessels operating in restricted waterways."
