rule_id: USCG-M-137-135-DRYDOCK
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 137.135"
title: "Drydock Examination"
subchapter: M
category: certificates

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 30
  metric: days_since_drydock
  frequency_text: "Every 5 years (or per TSMS)"

required_action: >
  Vessel must undergo drydock examination. Schedule with USCG-approved
  facility or third-party organization (TPO) under TSMS. Hull plating,
  frames, and structural members assessed for wastage and damage.
  Underwater survey in lieu of drydock (UWILD) may be available.
deadline_calc: "last_drydock_date + 1825 days (5 years standard)"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-137.135"
notes: "TSMS-enrolled vessels may follow alternative examination schedule per approved TSMS."
