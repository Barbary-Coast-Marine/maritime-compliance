rule_id: USCG-M-137-135-ISE
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 137.135"
title: "Internal Structural Examination"
subchapter: M
category: certificates

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 30
  metric: days_since_internal_structural_exam
  frequency_text: "As scheduled (typically every 5 years)"

required_action: >
  Conduct internal structural examination of hull spaces, tanks, and
  voids. Inspect frames, plating, stiffeners, and structural connections
  for wastage, fractures, and deterioration. May be conducted by USCG
  marine inspector or TPO surveyor under TSMS. Record findings and
  corrective actions.
deadline_calc: "last_internal_structural_exam_date + 1825 days"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-137.135"
notes: "Schedule coordinated with drydock examination when possible."
