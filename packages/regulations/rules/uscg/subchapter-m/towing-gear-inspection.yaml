rule_id: USCG-M-142-340-TOWGEAR
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.340"
title: "Towing Gear Inspection"
subchapter: M
category: inspections

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1
  warning_days: 0
  critical_days: 0
  metric: days_since_towing_gear_inspection
  frequency_text: "Daily when towing"

required_action: >
  Inspect all towing gear including towlines, bridles, shackles, winches,
  towing bitts, and associated hardware. Check for chafing, wear, broken
  wires, and proper securing. Verify emergency release mechanisms are
  functional. Record in logbook.
deadline_calc: "Daily while towing operations are underway"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.340"
notes: "Critical safety item — towing gear failure is a leading cause of towing vessel casualties."
