rule_id: USCG-M-142-225-EMLIGHT
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.225"
title: "Emergency Lighting and Power Test"
subchapter: M
category: inspections

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_emergency_lighting_test
  frequency_text: "Monthly"

required_action: >
  Test emergency lighting and power systems to verify they activate
  properly on loss of main power. Test emergency generator under load.
  Verify battery-powered emergency lights in engine room, pilothouse,
  and crew quarters are functional. Record in logbook.
deadline_calc: "last_emergency_lighting_test_date + 30 days"
fine_range_usd: [2000, 15000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.225"
notes: null
