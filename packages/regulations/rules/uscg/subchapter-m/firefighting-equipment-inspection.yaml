rule_id: USCG-M-142-225-FIREEQUIP
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 142.225"
title: "Firefighting Equipment Inspection"
subchapter: M
category: inspections

applies_to:
  vessel_types: [towing]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_firefighting_equipment_inspection
  frequency_text: "Monthly"

required_action: >
  Inspect all firefighting equipment including portable fire extinguishers,
  fire hoses, nozzles, fire pumps, and fixed fire-extinguishing systems.
  Verify proper location, charge level, accessibility, and physical
  condition. Test fire pump operation. Record in logbook.
deadline_calc: "last_firefighting_equipment_inspection_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-142.225"
notes: null
