rule_id: USCG-H-78-77-MONTHLY
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 78.77"
title: "Lifesaving Equipment Monthly Inspection"
subchapter: H
category: inspections

applies_to:
  vessel_types: [passenger]
  flag_states: [US]
  gross_tonnage_min: 100
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_lifesaving_monthly_inspection
  frequency_text: "Monthly"

required_action: >
  Inspect each lifesaving appliance including lifeboat equipment against
  manufacturer checklist. Verify all equipment aboard and in good order.
  Test EPIRB using integrated test circuit. Test each SART.
  Enter inspection report and condition statement in vessel logbook.
deadline_calc: "last_lifesaving_monthly_inspection_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-78.77"
notes: "Weekly visual inspection is a separate requirement."
