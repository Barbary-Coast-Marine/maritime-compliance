required_action: >
  Maintain official logbook (CG-706B or CG-706C) with all required
  entries per statute. Record drills, inspections, tests, departures,
  arrivals, crew changes, and incidents. Required for vessels on
  foreign voyages or 100+ GT between Atlantic and Pacific ports.
