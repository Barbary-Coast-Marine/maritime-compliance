citation: "46 CFR 71.25"
title: "Certificate of Inspection Validity"
subchapter: H
category: certificates

applies_to:
  vessel_types: [passenger]
  flag_states: [US]
  gross_tonnage_min: 100
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 60
  metric: days_until_coi_expiry
  frequency_text: "Every 5 years"

required_action: >
  Apply for COI renewal. Vessel must pass inspection for certification
  including hull, machinery, electrical, lifesaving, fire protection,
  and stability verification. Cannot carry passengers with expired COI.
deadline_calc: "coi_expiry_date"
fine_range_usd: [10000, 100000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-71.25"
notes: "Operating without valid COI is a criminal offense under 46 USC 3318."
