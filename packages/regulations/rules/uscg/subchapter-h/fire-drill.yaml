rule_id: USCG-H-78-37-FIRE
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 78.37"
title: "Fire Drill"
subchapter: H
category: drills

applies_to:
  vessel_types: [passenger]
  flag_states: [US]
  gross_tonnage_min: 100
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_fire_drill
  frequency_text: "Weekly when carrying passengers"

required_action: >
  Conduct fire drill with all crew. Must include: sounding general alarm,
  simulating fire emergency, starting fire pumps, testing hose outlets,
  demonstrating breathing apparatus, operating watertight and fire doors,
  closing ventilation to protected spaces. Log in official logbook.
deadline_calc: "last_fire_drill_date + 7 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-78.37"
notes: "Monthly frequency acceptable when not carrying passengers."
