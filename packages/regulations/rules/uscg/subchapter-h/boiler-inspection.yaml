rule_id: USCG-H-52-BOILER
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR Part 52"
title: "Boiler Internal Inspection (Steam Vessels)"
subchapter: H
category: inspections

applies_to:
  vessel_types: [passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 365
  warning_days: 60
  critical_days: 14
  metric: days_since_boiler_inspection
  frequency_text: "Annual"

required_action: >
  USCG marine inspector must conduct internal inspection of boilers,
  safety valve test, and feedwater system inspection. Hydrostatic
  test per inspector schedule. Vessel cannot operate with expired
  boiler certification.
deadline_calc: "last_boiler_inspection_date + 365 days"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/part-52"
notes: "Applies only to steam-powered vessels. O'Brien has Foster Wheeler boilers."
