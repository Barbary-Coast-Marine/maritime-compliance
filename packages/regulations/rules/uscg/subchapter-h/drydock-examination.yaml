rule_id: USCG-H-71-50
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 71.50"
title: "Drydock Examination"
subchapter: H
category: certificates

applies_to:
  vessel_types: [passenger]
  flag_states: [US]
  gross_tonnage_min: 100
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 1825
  warning_days: 180
  critical_days: 30
  metric: days_since_drydock
  frequency_text: "Every 5 years"

required_action: >
  Vessel must undergo drydock examination and internal structural
  examination. Schedule with USCG-approved facility.
  Underwater Survey in Lieu of Drydocking (UWILD) may be available
  per 46 CFR 71.53.
deadline_calc: "last_drydock_date + 1825 days (5 years)"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-71.50"
notes: "UWILD alternative available. AHE program may also apply. Check COI for specific interval."
