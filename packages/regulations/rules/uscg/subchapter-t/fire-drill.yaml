rule_id: USCG-T-185-520-FIRE
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 185.520"
title: "Fire Drill"
subchapter: T
category: drills

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_fire_drill
  frequency_text: "Weekly when vessel is in operation"

required_action: >
  Conduct fire drill. Must include: sounding general alarm, reporting
  to assigned stations, simulating fire emergency, starting fire pumps,
  using sufficient outlets to verify system working, bringing out
  breathing apparatus and demonstrating use. Log in vessel logbook.
deadline_calc: "last_fire_drill_date + 7 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-185.520"
notes: "Required each week vessel operates. If crew changes more than once in 2 weeks, drill ASAP after new crew arrives."
