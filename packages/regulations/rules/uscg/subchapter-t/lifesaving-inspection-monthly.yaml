rule_id: USCG-T-185-512-MONTHLY
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 185.512"
title: "Lifesaving Equipment Monthly Inspection"
subchapter: T
category: inspections

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 30
  warning_days: 7
  critical_days: 0
  metric: days_since_lifesaving_monthly_inspection
  frequency_text: "Monthly"

required_action: >
  Inspect each lifesaving appliance including equipment per manufacturer
  checklist. Verify all items aboard and in good order. Test EPIRB
  using integrated test circuit. Enter inspection report in logbook.
deadline_calc: "last_lifesaving_monthly_inspection_date + 30 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-185.512"
notes: "Weekly visual inspection is a separate requirement."
