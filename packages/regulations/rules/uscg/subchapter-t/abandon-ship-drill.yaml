rule_id: USCG-T-185-520-ABANDON
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 185.520"
title: "Abandon Ship Drill"
subchapter: T
category: drills

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_abandon_ship_drill
  frequency_text: "Weekly when vessel is in operation"

required_action: >
  Conduct abandon-ship drill. Must include: sounding general alarm,
  mustering passengers and crew at survival craft, checking lifejackets
  correctly donned, lowering at least one survival craft or rescue boat.
  At least one night drill per quarter. Log in vessel logbook.
deadline_calc: "last_abandon_ship_drill_date + 7 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-185.520"
notes: "Alternates weekly with fire drill. Each lifeboat launched with crew aboard at least once every 3 months."
