rule_id: USCG-T-185-512-WEEKLY
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 185.512"
title: "Lifesaving Equipment Weekly Visual Inspection"
subchapter: T
category: inspections

applies_to:
  vessel_types: [small_passenger]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: 100

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_lifesaving_weekly_inspection
  frequency_text: "Weekly"

required_action: >
  Visual inspection of each lifesaving appliance and launching appliance
  to ensure ready for use. Run each rescue boat engine ahead and astern
  for at least 3 minutes. Activate general alarm system.
deadline_calc: "last_lifesaving_weekly_inspection_date + 7 days"
fine_range_usd: [2000, 15000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-185.512"
notes: null
