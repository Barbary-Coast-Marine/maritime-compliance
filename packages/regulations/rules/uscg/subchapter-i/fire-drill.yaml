rule_id: USCG-I-97-1555-FIRE
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 97.15-55"
title: "Fire Drill"
subchapter: I
category: drills

applies_to:
  vessel_types: [cargo]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 30
  warning_days: 5
  critical_days: 1
  metric: days_since_fire_drill
  frequency_text: "Monthly minimum; weekly if crew exceeds 25"

required_action: >
  Conduct fire drill with all crew. Must include: sounding general alarm,
  reporting to assigned stations, simulating fire emergency, starting fire
  pumps, testing hose outlets, demonstrating breathing apparatus, operating
  watertight and fire doors. If crew exceeds 25, conduct weekly. Log in
  official logbook.
deadline_calc: "last_fire_drill_date + 30 days (7 days if crew > 25)"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-97.15-55"
notes: "Weekly frequency required when crew exceeds 25 persons."
