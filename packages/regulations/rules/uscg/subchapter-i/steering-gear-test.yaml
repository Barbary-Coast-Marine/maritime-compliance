citation: "46 CFR 97.15-15"
title: "Steering Gear Test"
subchapter: I
category: pre_departure

applies_to:
  vessel_types: [cargo]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Pre-departure (within 12 hours before departure)"

required_action: >
  Test steering gear within 12 hours before departure. Operate main
  and auxiliary steering gear through full range. Test all steering
  gear control systems including remote and local stations. Verify
  emergency steering procedures. Test communication between bridge
  and steering gear compartment. Log in official logbook.
deadline_calc: "Within 12 hours before departure"
fine_range_usd: [10000, 50000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-97.15-15"
notes: "Must be completed no more than 12 hours before departure."
