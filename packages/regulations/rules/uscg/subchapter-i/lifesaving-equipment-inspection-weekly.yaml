rule_id: USCG-I-97-1540-LIFESAVE-W
status: draft
verified_by: null
verified_date: null
legal_review: false

citation: "46 CFR 97.15-40"
title: "Lifesaving Equipment Inspection — Weekly"
subchapter: I
category: inspections

applies_to:
  vessel_types: [cargo]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: calendar
  interval_days: 7
  warning_days: 2
  critical_days: 0
  metric: days_since_lifesaving_weekly_inspection
  frequency_text: "Weekly"

required_action: >
  Conduct weekly visual inspection of all lifesaving equipment. Verify
  lifeboats, liferafts, lifejackets, and ring buoys are in proper
  stowage, accessible, and free of visible damage. Check lifeboat
  davits and launching gear. Log in official logbook.
deadline_calc: "last_lifesaving_weekly_inspection_date + 7 days"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-97.15-40"
notes: null
