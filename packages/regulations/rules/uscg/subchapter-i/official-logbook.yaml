citation: "46 CFR 97.15-1"
title: "Official Logbook"
subchapter: I
category: certificates

applies_to:
  vessel_types: [cargo]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Continuous"

required_action: >
  Maintain an official logbook recording all required entries including
  drills, inspections, crew changes, incidents, and navigational events.
  Entries must be made in ink, signed by the master or officer in charge,
  and preserved for at least one year after the date of last entry.
  Logbook must be available for USCG inspection at all times.
deadline_calc: "Continuous — entries required as events occur"
fine_range_usd: [5000, 25000]
uscg_reference_url: "https://www.ecfr.gov/current/title-46/section-97.15-1"
notes: "Failure to maintain official logbook is a separate citable offense."
