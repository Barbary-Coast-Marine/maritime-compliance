citation: "46 CFR 97.15-13"
title: "Hatch Securing"
subchapter: I
category: pre_departure

applies_to:
  vessel_types: [cargo]
  flag_states: [US]
  gross_tonnage_min: null
  gross_tonnage_max: null

trigger:
  type: event
  interval_days: null
  warning_days: null
  critical_days: null
  metric: null
  frequency_text: "Pre-departure"

required_action: >
  Verify all cargo hatches are properly secured and weathertight before
  departure. Inspect hatch covers, gaskets, cleats, and battens for
  proper condition and closure. Test hatch cover tightness where
  applicable. Ensure no obstructions prevent proper sealing.
  Log in official logbook.
deadline_calc: "Before each departure"
fine_range_usd: [10000, 50000]
