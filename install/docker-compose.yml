version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: maritime-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime
      POSTGRES_DB: maritime
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: maritime-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build:
      context: ..
      dockerfile: install/Dockerfile
    container_name: maritime-db-init
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed"]
    environment:
      DATABASE_URL: postgresql://maritime:maritime@postgres:5432/maritime
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:-demo-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vessel-agent:
    build:
      context: ..
      dockerfile: install/Dockerfile
    container_name: maritime-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://maritime:maritime@postgres:5432/maritime
      REDIS_URL: redis://redis:6379
      PORT: "3200"
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:-demo-secret-change-me}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_API_URL: ${NEBIUS_API_URL:-https://api.studio.nebius.ai/v1/}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-meta-llama/Meta-Llama-3.1-70B-Instruct-fast}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  dashboard:
    build:
      context: ..
      dockerfile: install/Dockerfile.dashboard
    container_name: maritime-dashboard
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      - vessel-agent

  nginx:
    image: nginx:alpine
    container_name: maritime-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vessel-agent
      - dashboard

volumes:
  pgdata:
  redis-data:
