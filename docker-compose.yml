services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-marinedb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marinedev}
      POSTGRES_DB: maritime_compliance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-marinedb} -d maritime_compliance"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  db-init:
    build:
      context: .
      dockerfile: apps/vessel-agent/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-marinedb}:${DB_PASSWORD:-marinedev}@db:5432/maritime_compliance
    command: sh -c "node packages/db/dist/migrate.js && node packages/db/dist/seed.js"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  vessel-agent:
    build:
      context: .
      dockerfile: apps/vessel-agent/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-marinedb}:${DB_PASSWORD:-marinedev}@db:5432/maritime_compliance
      AUTH_SECRET: ${AUTH_SECRET:-maritime-dev-secret-change-me}
      PORT: "3200"
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_API_URL: ${NEBIUS_API_URL:-https://api.studio.nebius.ai/v1/}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-meta-llama/Llama-3.3-70B-Instruct}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - internal

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: always
    depends_on:
      - vessel-agent
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./install/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
      - vessel-agent
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
